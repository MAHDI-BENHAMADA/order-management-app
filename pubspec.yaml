name: Livrini
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.3.2
  http: ^1.6.0
  shared_preferences: ^2.5.5
  google_sign_in: ^6.2.2
  googleapis: ^16.0.0
  googleapis_auth: ^2.3.0
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.5

flutter:

  uses-material-design: true

  assets:
    - communes.json
    - assets/branding/logo.png
    - assets/branding/splash.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/logo.png
  adaptive_icon_background: '#FFFFFF'
  adaptive_icon_foreground: assets/branding/logo.png
  remove_alpha_ios: true

flutter_native_splash:
  color: '#FFFFFF'
  image: assets/branding/logo.png
  android_12:
    color: '#FFFFFF'
    image: assets/branding/logo.png


